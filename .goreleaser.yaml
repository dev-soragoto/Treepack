version: 2

builds:
  - id: treepack
    main: ./cmd/treepack
    binary: treepack
    env:
      - CGO_ENABLED=0
    goos: [windows, linux, darwin]
    goarch: [amd64, arm64]
    goamd64: [v1]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{ trim (mustReadFile "VERSION") }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

snapshot:
  version_template: '{{ trim (mustReadFile "VERSION") }}'

checksum:
  name_template: checksums.txt
